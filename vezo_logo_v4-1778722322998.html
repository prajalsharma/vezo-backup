<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
.page { display: flex; flex-direction: column; gap: 0; padding: 32px 24px; align-items: center; }
.row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.card { border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px 32px 28px; width: 268px; gap: 0; }
.dark { background: #0d0d0d; }
.light { background: #ffffff; border: 1px solid #e6e6e6; }
.wordmark { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -0.05em; margin-top: 20px; line-height: 1; }
.tag { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; font-size: 8.5px; font-weight: 600; letter-spacing: 0.28em; margin-top: 8px; }
.modetext { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-align: center; margin-top: 10px; }
.section-label { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.2em; margin-bottom: 14px; color: #888; }
.icon-strip { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 8px; }
</style>

<div class="page">
  <div class="row">

    <!-- DARK CARD -->
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="card dark">
        <svg width="140" height="100" viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
          <!--
            Mark concept: Two identical rhombic/diamond half-forms
            that together create a perfect V-chevron.
            Each half is a parallelogram with a precise cut —
            left half tilts right, right half tilts left, meeting at apex.
            The top of each half is open (notched) — referencing the
            lock shackle / open escrow that closes when locked.
            Perfectly symmetric on vertical axis. Grid-constructed.
          -->
          <defs>
            <clipPath id="clipL">
              <rect x="0" y="0" width="70" height="100"/>
            </clipPath>
            <clipPath id="clipR">
              <rect x="70" y="0" width="70" height="100"/>
            </clipPath>
          </defs>

          <!-- Left arm: a solid filled chevron half -->
          <!-- Shape: top-left corner → inward notch → diagonal down to apex → back up outer edge -->
          <polygon
            points="8,4 54,4 70,88 24,88"
            fill="#FF0040"
          />
          <!-- Notch cut — top center cut creating the "opening" -->
          <polygon
            points="36,4 54,4 62,38 44,38"
            fill="#0d0d0d"
          />

          <!-- Right arm: mirror -->
          <polygon
            points="132,4 86,4 70,88 116,88"
            fill="#FF0040"
          />
          <polygon
            points="104,4 86,4 78,38 96,38"
            fill="#0d0d0d"
          />

          <!-- Thin gap line between the two halves for crispness -->
          <line x1="70" y1="10" x2="70" y2="88" stroke="#0d0d0d" stroke-width="2"/>
        </svg>

        <div class="wordmark" style="color:#ffffff;">vezo</div>
        <div class="tag" style="color:#FF0040;">VENFT MARKETPLACE</div>
      </div>
      <div class="modetext" style="color:#555;">dark mode</div>
    </div>

    <!-- LIGHT CARD -->
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="card light">
        <svg width="140" height="100" viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="clipL2">
              <rect x="0" y="0" width="70" height="100"/>
            </clipPath>
            <clipPath id="clipR2">
              <rect x="70" y="0" width="70" height="100"/>
            </clipPath>
          </defs>
          <polygon points="8,4 54,4 70,88 24,88" fill="#FF0040"/>
          <polygon points="36,4 54,4 62,38 44,38" fill="#ffffff"/>
          <polygon points="132,4 86,4 70,88 116,88" fill="#FF0040"/>
          <polygon points="104,4 86,4 78,38 96,38" fill="#ffffff"/>
          <line x1="70" y1="10" x2="70" y2="88" stroke="#ffffff" stroke-width="2"/>
        </svg>

        <div class="wordmark" style="color:#0d0d0d;">vezo</div>
        <div class="tag" style="color:#FF0040;">VENFT MARKETPLACE</div>
      </div>
      <div class="modetext" style="color:#bbb;">light mode</div>
    </div>
  </div>

  <!-- Icon sizes strip -->
  <div style="font-family:-apple-system,sans-serif;font-size:10px;font-weight:600;letter-spacing:0.2em;color:#777;margin-bottom:16px;">ICON SIZES</div>
  <div class="row" style="margin-bottom:0;align-items:center;gap:16px;">

    <!-- 64px icon dark -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="background:#0d0d0d;border-radius:14px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;">
        <svg width="40" height="40" viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
          <polygon points="8,4 54,4 70,88 24,88" fill="#FF0040"/>
          <polygon points="36,4 54,4 62,38 44,38" fill="#0d0d0d"/>
          <polygon points="132,4 86,4 70,88 116,88" fill="#FF0040"/>
          <polygon points="104,4 86,4 78,38 96,38" fill="#0d0d0d"/>
          <line x1="70" y1="10" x2="70" y2="88" stroke="#0d0d0d" stroke-width="2"/>
        </svg>
      </div>
      <span style="font-family:-apple-system,sans-serif;font-size:9px;color:#666;">64px</span>
    </div>

    <!-- 40px icon dark -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="background:#0d0d0d;border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;">
        <svg width="24" height="24" viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
          <polygon points="8,4 54,4 70,88 24,88" fill="#FF0040"/>
          <polygon points="36,4 54,4 62,38 44,38" fill="#0d0d0d"/>
          <polygon points="132,4 86,4 70,88 116,88" fill="#FF0040"/>
          <polygon points="104,4 86,4 78,38 96,38" fill="#0d0d0d"/>
        </svg>
      </div>
      <span style="font-family:-apple-system,sans-serif;font-size:9px;color:#666;">40px</span>
    </div>

    <!-- 64px icon on RED (inverted / brand bg) -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="background:#FF0040;border-radius:14px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;">
        <svg width="40" height="40" viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
          <polygon points="8,4 54,4 70,88 24,88" fill="#ffffff"/>
          <polygon points="36,4 54,4 62,38 44,38" fill="#FF0040"/>
          <polygon points="132,4 86,4 70,88 116,88" fill="#ffffff"/>
          <polygon points="104,4 86,4 78,38 96,38" fill="#FF0040"/>
        </svg>
      </div>
      <span style="font-family:-apple-system,sans-serif;font-size:9px;color:#666;">on red</span>
    </div>

    <!-- 40px icon light -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="background:#ffffff;border:1px solid #e6e6e6;border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;">
        <svg width="24" height="24" viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
          <polygon points="8,4 54,4 70,88 24,88" fill="#FF0040"/>
          <polygon points="36,4 54,4 62,38 44,38" fill="#ffffff"/>
          <polygon points="132,4 86,4 70,88 116,88" fill="#FF0040"/>
          <polygon points="104,4 86,4 78,38 96,38" fill="#ffffff"/>
        </svg>
      </div>
      <span style="font-family:-apple-system,sans-serif;font-size:9px;color:#666;">40px</span>
    </div>

    <!-- horizontal lockup -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="background:#0d0d0d;border-radius:12px;padding:10px 18px;display:flex;align-items:center;gap:10px;">
        <svg width="22" height="18" viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
          <polygon points="8,4 54,4 70,88 24,88" fill="#FF0040"/>
          <polygon points="36,4 54,4 62,38 44,38" fill="#0d0d0d"/>
          <polygon points="132,4 86,4 70,88 116,88" fill="#FF0040"/>
          <polygon points="104,4 86,4 78,38 96,38" fill="#0d0d0d"/>
        </svg>
        <span style="font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.04em;color:#fff;">vezo</span>
      </div>
      <span style="font-family:-apple-system,sans-serif;font-size:9px;color:#666;">horizontal</span>
    </div>

  </div>
</div>
